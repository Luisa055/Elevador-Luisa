<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTop - Silo 04</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>SILO 04 - AgroTop</h1>

        <!-- SILO -->

        <div class="silo">

            <div id="nivelSilo"></div>

        </div>

        <!-- DISPLAY DIGITAL -->

        <div id="painelLED" class="painel-led">
            0 KG
        </div>

        <!-- ALERTA -->

        <div id="alerta" class="alerta oculto">
            CAPACIDADE MÁXIMA!
        </div>

        <!-- BOTÕES -->

        <div class="botoes">

            <button id="carregar">
                Despejar 500kg
            </button>

            <button id="resetar">
                Liberar para Caminhão
            </button>

        </div>

        <!-- STATUS -->

        <div class="status">

            <p id="statusSistema">
                ESTEIRA OPERANDO NORMALMENTE
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
