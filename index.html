<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESI Elevador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>SESI Elevador</h1>

        <div class="painel">
            <h2>Carga Atual</h2>
            <p id="peso">0 kg</p>
        </div>

        <div id="alerta" class="alerta oculto">
            SOBRECARGA!
        </div>

        <div class="botoes">
            <button id="adicionar">Adicionar 100kg</button>
            <button id="resetar">Resetar</button>
        </div>

        <div class="status">
            <p id="statusElevador">Elevador Liberado</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
